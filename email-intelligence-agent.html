<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Colleague Hub — Email Intelligence Agent</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f0;
  --white:#ffffff;
  --card:#ffffff;
  --border:#e8e5de;
  --border-light:#f0ede6;
  --text:#1a1a1a;
  --text2:#555;
  --muted:#999;
  --orange:#e67e22;
  --orange-light:#fef3e6;
  --orange-dark:#d35400;
  --red:#e74c3c;
  --red-light:#fdecea;
  --blue:#3498db;
  --blue-light:#eaf4fd;
  --green:#27ae60;
  --green-light:#e8f8ef;
  --r:12px;
  --rs:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,.08);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hdr-left{display:flex;align-items:center;gap:14px}
.logo{width:38px;height:38px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;letter-spacing:-.02em}
.hdr-title{font-size:16px;font-weight:700;color:var(--text)}
.hdr-sub{font-size:12px;color:var(--muted);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:16px}
.hdr-status{display:flex;align-items:center;gap:7px;padding:6px 14px;background:var(--orange-light);border-radius:20px;font-size:12px;font-weight:600;color:var(--orange)}
.hdr-dot{width:7px;height:7px;background:var(--orange);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stats{display:flex;gap:20px}
.stat{text-align:center}
.stat-num{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}

/* MAIN LAYOUT */
.main{max-width:1200px;margin:0 auto;padding:24px 32px}

/* TEAM FILTER TABS */
.tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid var(--border);background:var(--white);color:var(--text2)}
.tab:hover{border-color:var(--orange);color:var(--orange)}
.tab.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.tab .count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:10px;font-size:11px;margin-left:6px;padding:0 6px}
.tab.active .count{background:rgba(255,255,255,.3)}
.tab:not(.active) .count{background:var(--bg);color:var(--muted)}

/* EMAIL CARDS */
.feed{display:flex;flex-direction:column;gap:12px}
.email-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:20px 24px;box-shadow:var(--shadow);transition:all .15s;cursor:pointer;position:relative;overflow:hidden}
.email-card:hover{box-shadow:var(--shadow-lg);border-color:#d0cdc6}
.email-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--r) 0 0 var(--r)}
.email-card.cat-vertraging::before{background:var(--red)}
.email-card.cat-prijswijziging::before{background:var(--orange)}
.email-card.cat-productupdate::before{background:var(--blue)}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:12px}
.card-left{flex:1;min-width:0}
.card-from{font-size:14px;font-weight:700;margin-bottom:2px}
.card-company{font-size:12px;color:var(--muted)}
.card-badges{display:flex;gap:6px;flex-shrink:0;align-items:center}
.badge{padding:4px 12px;border-radius:14px;font-size:11px;font-weight:600}
.badge.vertraging{background:var(--red-light);color:var(--red)}
.badge.prijswijziging{background:var(--orange-light);color:var(--orange-dark)}
.badge.productupdate{background:var(--blue-light);color:var(--blue)}
.badge-urg{padding:4px 10px;border-radius:14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.badge-urg.hoog{background:var(--red-light);color:var(--red)}
.badge-urg.medium{background:var(--orange-light);color:var(--orange)}
.badge-urg.laag{background:var(--green-light);color:var(--green)}

.card-subject{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text)}
.card-summary{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px}

.card-facts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.fact-chip{padding:4px 12px;background:var(--bg);border-radius:8px;font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;white-space:nowrap}

.card-bottom{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border-light)}
.card-route{display:flex;align-items:center;gap:6px}
.route-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.route-team{display:flex;align-items:center;gap:5px;padding:5px 14px;background:var(--orange-light);border-radius:8px;font-size:12px;font-weight:700;color:var(--orange-dark)}
.card-action{font-size:12px;color:var(--green);font-weight:500;max-width:50%;text-align:right;line-height:1.4}
.card-date{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.card-meta-row{display:flex;align-items:center;gap:16px;margin-bottom:10px}

/* EXPAND ORIGINAL */
.card-orig{max-height:0;overflow:hidden;transition:max-height .3s ease}
.card-orig.open{max-height:600px}
.orig-content{padding:16px 20px;margin-top:14px;background:var(--bg);border-radius:var(--rs);border:1px solid var(--border)}
.orig-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.orig-content pre{font-family:'DM Sans',sans-serif;font-size:12px;line-height:1.7;color:var(--text2);white-space:pre-wrap}
.expand-btn{font-size:11px;color:var(--orange);font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit;padding:0}
.expand-btn:hover{color:var(--orange-dark)}

/* RESPONSIVE */
@media(max-width:768px){
  .hdr{padding:0 16px;height:auto;min-height:56px;flex-wrap:wrap;gap:8px;padding-top:10px;padding-bottom:10px}
  .hdr-title{font-size:14px}
  .hdr-sub{display:none}
  .stats{gap:12px}
  .stat-num{font-size:16px}
  .stat-label{font-size:9px}
  .hdr-status{font-size:11px;padding:5px 10px}
  .main{padding:16px}
  .tabs{gap:6px;margin-bottom:16px}
  .tab{padding:6px 12px;font-size:12px}
  .feed{gap:10px}
  .email-card{padding:14px 16px}
  .card-top{flex-direction:column;gap:8px}
  .card-badges{flex-wrap:wrap;justify-content:flex-start}
  .card-date{font-size:10px}
  .card-from{font-size:13px}
  .card-company{font-size:11px}
  .card-subject{font-size:13px}
  .card-summary{font-size:12px;margin-bottom:10px}
  .card-facts{gap:6px;margin-bottom:10px}
  .fact-chip{font-size:10px;padding:3px 8px}
  .card-bottom{flex-direction:column;gap:8px;align-items:flex-start}
  .card-action{max-width:100%;text-align:left;font-size:11px}
  .card-meta-row{margin-bottom:6px}
  .route-team{font-size:11px;padding:4px 10px}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="logo">AI</div>
    <div><div class="hdr-title">AI Colleague Hub</div><div class="hdr-sub">Email Intelligence Agent</div></div>
  </div>
  <div class="hdr-right">
    <div class="stats">
      <div class="stat"><div class="stat-num" style="color:var(--red)">2</div><div class="stat-label">Vertragingen</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--orange)">2</div><div class="stat-label">Prijswijzigingen</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--blue)">1</div><div class="stat-label">Product Updates</div></div>
    </div>
    <div class="hdr-status"><span class="hdr-dot"></span> Live monitoring</div>
  </div>
</div>

<div class="main">
  <div class="tabs">
    <div class="tab active" onclick="filterTeam('alle')">Alle mails<span class="count">5</span></div>
    <div class="tab" onclick="filterTeam('Operations')">⚙️ Operations<span class="count">1</span></div>
    <div class="tab" onclick="filterTeam('Klantenservice')">📞 Klantenservice<span class="count">1</span></div>
    <div class="tab" onclick="filterTeam('Financiën')">💰 Financiën<span class="count">2</span></div>
    <div class="tab" onclick="filterTeam('Warehouse')">🏭 Warehouse<span class="count">1</span></div>
  </div>
  <div class="feed" id="feed"></div>
</div>

<script>
const emails=[
{id:4,from:"Marco Bakker",company:"De Vries Transport",email:"m.bakker@devriestransport.nl",
subject:"Levering order #8842 wordt ca. 3 uur later",date:"13 apr · 07:15",

facts:["Order #8842 · 14 pallets","ETA 13:00-14:00 (was 10:00)","A2 afgesloten · Eindhoven"],
team:"Klantenservice",teamIcon:"📞",
action:"Blokker DC direct informeren over vertraagde levering",

Marco Bakker
Dispatcher
De Vries Transport`},

{id:1,from:"Jan de Vries",company:"Van Transport B.V.",email:"j.devries@vantransport.nl",
subject:"Vertraging container MSCU-449821 Rotterdam",date:"13 apr · 08:41",
category:"vertraging",categoryLabel:"Vertraging",urgency:"medium",urgencyLabel:"Medium",
summary:"Container MSCU-449821 komt één dag later aan in Rotterdam (16 i.p.v. 15 april) door congestie bij terminal Europoort.",
facts:["ETA 16 apr (+1 dag)","BK-2026-08834 · 1x 40ft HC","Terminal Europoort congestie"],
team:"Operations",teamIcon:"⚙️",
action:"Ontvanger informeren, warehouse-slot 16 april checken",
body:`Beste,

Hierbij informeren wij u dat container MSCU-449821 met bestemming Rotterdam een vertraging oploopt van één werkdag.

Oorspronkelijke ETA: 15 april 2026
Nieuwe ETA: 16 april 2026

Reden: congestie terminal Europoort. Het schip ligt momenteel op de rede in afwachting van een ligplaats.

Booking reference: BK-2026-08834
Inhoud: 1x 40ft HC — consumentenelektronica

Wij houden u op de hoogte van verdere ontwikkelingen.

Met vriendelijke groet,
Jan de Vries
Van Transport B.V.`},

{id:2,from:"Sandra Willems",company:"Beekman Logistics",email:"s.willems@beekmanlogistics.nl",
subject:"Aangepaste tarieven Benelux per 1 mei",date:"12 apr · 14:20",
category:"prijswijziging",categoryLabel:"Prijswijziging",urgency:"hoog",urgencyLabel:"Hoog",
summary:"Beekman Logistics verhoogt Benelux-tarieven gemiddeld 4,5% per 1 mei. Pallettarief NL gaat van €68 naar €71.",
facts:["Per 1 mei 2026","Gemiddeld +4,5%","Pallet NL: €68 → €71"],
team:"Financiën",teamIcon:"💰",
action:"Tarievenlijst vergelijken, heronderhandeling overwegen",
body:`Geachte relatie,

Per 1 mei 2026 passen wij onze tarieven aan voor distributieverkeer binnen de Benelux. De aanpassing bedraagt gemiddeld 4,5% en is het gevolg van gestegen brandstof- en personeelskosten.

Bestaande contracten met vaste prijsafspraken blijven ongewijzigd tot de einddatum.

Heeft u vragen? Neem gerust contact op.

Met vriendelijke groet,
Sandra Willems
Commercieel Manager
Beekman Logistics`},

{id:5,from:"Annemiek Groen",company:"Warehousing Plus B.V.",email:"a.groen@warehousingplus.nl",
subject:"Aanpassing opslagtarieven per 1 juni 2026",date:"10 apr · 16:33",
category:"prijswijziging",categoryLabel:"Prijswijziging",urgency:"hoog",urgencyLabel:"Hoog",
summary:"Warehousing Plus verhoogt opslagtarieven per 1 juni met 7-9% vanwege energiekosten en CPI-indexatie.",
facts:["Per 1 juni 2026","Pallet: €2,85 → €3,10/wk","Handling: €3,50 → €3,75"],
team:"Financiën",teamIcon:"💰",
action:"Impact berekenen, alternatieve warehouses vergelijken",
body:`Geachte huurder,

Door gestegen energiekosten en de jaarlijkse CPI-indexatie passen wij onze opslagtarieven aan per 1 juni 2026.

De nieuwe tarieven:
- Palletopslag: €2,85 → €3,10 per palletplaats per week (+8,8%)

- Handling in/uit: €3,50 → €3,75 per pallet (+7,1%)

Deze tarieven gelden voor alle klanten zonder lopend contract met vaste prijsafspraak.

De volledige tarievenlijst 2026-2027 sturen wij u volgende week toe.

Met vriendelijke groet,
Annemiek Groen
Directeur
Warehousing Plus B.V.`},

{id:3,from:"Pieter Kolen",company:"Jungheinrich Nederland",email:"p.kolen@jungheinrich.nl",
subject:"Nieuw: ETV 216i reachtruck met verlengde batterijduur",date:"11 apr · 10:05",
category:"productupdate",categoryLabel:"Product Update",urgency:"laag",urgencyLabel:"Laag",
summary:"Jungheinrich introduceert de ETV 216i reachtruck met 30% langere batterijduur. Proefperiode van 2 weken beschikbaar.",
facts:["Batterij: 12 uur (+30%)","Snelladen: 80% in 45 min","2 weken proefperiode"],
team:"Warehouse",teamIcon:"🏭",
action:"Beoordelen of demo inplannen zinvol is voor vervanging huidig materieel",
body:`Beste,

Graag informeren wij u over onze nieuwe reachtruck, de ETV 216i. Dit model is nu beschikbaar met een lithium-ion batterij die 30% langer meegaat dan de vorige generatie.

Belangrijkste verbeteringen:
- Batterijduur: tot 12 uur onafgebroken gebruik
- Snellaadtijd: 80% in 45 minuten
- Hefcapaciteit: 1.600 kg op 10,7 meter
- Nieuw display met realtime energieverbruik

Wij bieden een proefperiode van 2 weken aan zodat u het verschil in de praktijk kunt ervaren.

Zullen we een afspraak inplannen voor een demo op uw locatie?

Met vriendelijke groet,
Pieter Kolen
Accountmanager
Jungheinrich Nederland`}
];

let activeFilter='alle';

function filterTeam(team){
  activeFilter=team;
  document.querySelectorAll('.tab').forEach(t=>{
    const label=t.textContent.replace(/\d+/g,'').trim();
    if(team==='alle'&&label.startsWith('Alle')) t.classList.add('active');
    else if(t.textContent.includes(team)) t.classList.add('active');
    else t.classList.remove('active');
  });
  renderFeed();
}

function renderFeed(){
  const filtered=activeFilter==='alle'?emails:emails.filter(e=>e.team===activeFilter);
  document.getElementById('feed').innerHTML=filtered.map(e=>`
    <div class="email-card cat-${e.category}" id="card-${e.id}">
      <div class="card-top">
        <div class="card-left">
          <div class="card-meta-row">
            <div><div class="card-from">${e.from}</div><div class="card-company">${e.company}</div></div>
          </div>
          <div class="card-subject">${e.subject}</div>
        </div>
        <div class="card-badges">
          <span class="badge ${e.category}">${e.categoryLabel}</span>
          <span class="badge-urg ${e.urgency}">${e.urgencyLabel}</span>
          <span class="card-date">${e.date}</span>
        </div>
      </div>
      <div class="card-summary">${e.summary}</div>
      <div class="card-facts">${e.facts.map(f=>`<span class="fact-chip">${f}</span>`).join('')}</div>
      <div class="card-bottom">
        <div class="card-route">
          <span class="route-label">Gerouteerd naar</span>
          <span class="route-team">${e.teamIcon} ${e.team}</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px">
          <div class="card-action">💡 ${e.action}</div>
          <button class="expand-btn" onclick="toggleOrig(${e.id})">Toon origineel ▾</button>
        </div>
      </div>
      <div class="card-orig" id="orig-${e.id}">
        <div class="orig-content">
          <div class="orig-label">✉️ Origineel bericht</div>
          <pre>${e.body}</pre>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleOrig(id){
  const el=document.getElementById('orig-'+id);
  const btn=el.parentElement.querySelector('.expand-btn');
  el.classList.toggle('open');
  btn.textContent=el.classList.contains('open')?'Verberg origineel ▴':'Toon origineel ▾';
}

renderFeed();
</script>
</body>
</html>
